<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falio App - İndir</title>
    <meta name="description" content="Falio : Astroloji, Rüya & Fal uygulamasını indir. Günlük burç yorumları, canlı fal ve astroloji rehberin.">
    
    <!-- Smart redirect based on platform -->
    <meta http-equiv="refresh" content="3;url=https://play.google.com/store/apps/details?id=com.veysel35.Falio">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a0533 50%, #24243e 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .redirect-container {
            padding: 2rem;
            max-width: 400px;
        }
        .app-icon {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(139,92,246,0.4);
            margin-bottom: 1.5rem;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #a5b4c8;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }
        .redirect-text {
            color: #8b8fa3;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }
        .manual-link {
            display: inline-block;
            background: #8b5cf6;
            color: white;
            text-decoration: none;
            padding: 0.85rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(139,92,246,0.4);
        }
        .manual-link:hover {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139,92,246,0.5);
        }
        .back-link {
            display: block;
            margin-top: 1.5rem;
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }
        .back-link:hover { color: #8b5cf6; }
    </style>
</head>
<body>
    <div class="redirect-container">
        <img src="../android-icon-web.png" alt="Falio App" class="app-icon">
        <h1>Falio : Astroloji, Rüya & Fal</h1>
        <p class="subtitle">Uygulama mağazasına yönlendiriliyorsunuz...</p>
        <div class="spinner"></div>
        <p class="redirect-text">Otomatik yönlendirme çalışmazsa aşağıdaki butona tıklayın</p>
        <a href="https://play.google.com/store/apps/details?id=com.veysel35.Falio" class="manual-link" id="store-link">
            📱 Google Play'de Aç
        </a>
        <a href="../" class="back-link">← VB TECH LABS'a Dön</a>
    </div>

    <script>
        (function() {
            var playStore = 'https://play.google.com/store/apps/details?id=com.veysel35.Falio';
            // var appStore = 'https://apps.apple.com/app/falio'; // App Store link gelince eklenecek
            
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
            // var isAndroid = /android/i.test(ua);
            
            // iOS ise App Store'a yönlendir (şimdilik Play Store'a)
            // if (isIOS && appStore) { window.location.href = appStore; }
            
            // Herkesi Play Store'a yönlendir
            setTimeout(function() {
                window.location.href = playStore;
            }, 2000);
        })();
    </script>
</body>
</html>
